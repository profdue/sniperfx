name: 🎯 Sniper System Auto Scan

on:
  schedule:
    - cron: '*/15 * * * 1-5'  # Runs EVERY 15 MINUTES Monday-Friday
  workflow_dispatch:  # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests yfinance pandas numpy scipy python-dotenv
      
      - name: Run Market Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: true
        run: python sniper_system.py
