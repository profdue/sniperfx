name: Debug Telegram

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv
      
      - name: Debug Telegram Connection
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
import requests
import os
import sys

print('='*50)
print('🔍 TELEGRAM DEBUG')
print('='*50)

bot_token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')

print(f'Bot Token: {bot_token[:10]}...{bot_token[-5:]}')
print(f'Chat ID: {chat_id}')
print()

# Test 1: Check if bot exists
print('Test 1: Checking bot info...')
url = f'https://api.telegram.org/bot{bot_token}/getMe'
try:
    response = requests.get(url)
    data = response.json()
    if data.get('ok'):
        print(f'✅ Bot found: @{data["result"]["username"]}')
    else:
        print(f'❌ Bot error: {data}')
        sys.exit(1)
except Exception as e:
    print(f'❌ Connection error: {e}')
    sys.exit(1)

# Test 2: Check for recent messages
print('\nTest 2: Checking recent updates...')
url = f'https://api.telegram.org/bot{bot_token}/getUpdates'
try:
    response = requests.get(url, timeout=10)
    data = response.json()
    if data.get('ok'):
        if data['result']:
            print(f'✅ Found {len(data["result"])} recent messages')
            for update in data['result']:
                if 'message' in update:
                    msg = update['message']
                    print(f'   • From: {msg["from"].get("username", "unknown")}')
                    print(f'     Chat ID: {msg["chat"]["id"]}')
                    print(f'     Text: {msg.get("text", "no text")}')
        else:
            print('❌ No recent messages found')
            print('   Please send a message to @sweetsniperbot on Telegram')
    else:
        print(f'❌ API error: {data}')
except Exception as e:
    print(f'❌ Error: {e}')

# Test 3: Send test message
print('\nTest 3: Sending test message...')
url = f'https://api.telegram.org/bot{bot_token}/sendMessage'
payload = {
    'chat_id': chat_id,
    'text': '<b>🔧 DEBUG TEST</b>\nIf you see this, Telegram is working!',
    'parse_mode': 'HTML'
}
try:
    response = requests.post(url, json=payload, timeout=10)
    data = response.json()
    if data.get('ok'):
        print('✅ Test message sent successfully!')
    else:
        print(f'❌ Failed: {data.get("description")}')
        print(f'Full response: {data}')
except Exception as e:
    print(f'❌ Error: {e}')

print('\n' + '='*50)
print('🏁 Debug complete')
print('='*50)
"
